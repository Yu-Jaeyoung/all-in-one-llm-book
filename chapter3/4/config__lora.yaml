model_name: "Qwen/Qwen2.5-7B-Instruct"
dataset_path: "."
max_seq_length: 128
use_qlora: true                 

output_dir: "./output_lora"
num_train_epochs: 3
per_device_train_batch_size: 1  # 👈 VRAM 절약을 위해 1로 유지
per_device_eval_batch_size: 1   
gradient_accumulation_steps: 8  # 👈 8로 유지
learning_rate: 2.0e-4
optim: "paged_adamw_8bit"       # 👈 8비트 옵티마이저 필수
lr_scheduler_type: "cosine"
warmup_ratio: 0.05
fp16: true
bf16: false
gradient_checkpointing: true
logging_steps: 10
save_strategy: "epoch"
eval_strategy: "epoch"
load_best_model_at_end: true
seed: 42
report_to: "none"